# Deploys the theme to the store's PUBLISHED theme.
#
# Merging to main only updates this repository — nothing moves the code to
# the store by itself (there is no Shopify↔GitHub theme connection on this
# repo). This workflow is that missing step: whenever theme files change on
# main it pushes them to the live theme with Shopify CLI. It can also be run
# on demand from the Actions tab (optionally against a preview theme ID).
#
# One-time setup (repo Settings → Secrets and variables → Actions):
#   SHOPIFY_CLI_THEME_TOKEN   Theme Access password (shptka_…) — docs/deployment.md
#   SHOPIFY_STORE             your-store.myshopify.com
name: Deploy theme to Shopify

on:
  push:
    branches: [main]
    paths:
      - "assets/**"
      - "config/**"
      - "layout/**"
      - "locales/**"
      - "sections/**"
      - "snippets/**"
      - "templates/**"
  workflow_dispatch:
    inputs:
      theme_id:
        description: "Theme ID to push to (leave empty for the live theme)"
        required: false
        default: ""

concurrency:
  group: shopify-theme-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
      SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
    steps:
      - name: Check deploy secrets exist
        run: |
          if [ -z "$SHOPIFY_CLI_THEME_TOKEN" ] || [ -z "$SHOPIFY_FLAG_STORE" ]; then
            echo "::error::Missing SHOPIFY_CLI_THEME_TOKEN and/or SHOPIFY_STORE repository secrets — the theme was NOT deployed. See docs/deployment.md for the 5-minute setup."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Validate theme
        run: shopify theme check --fail-level error

      # --nodelete keeps files that exist only on the store (app snippets,
      # editor-created templates). config/settings_data.json is ignored so a
      # deploy can never clobber merchant settings made in the theme editor.
      - name: Push theme to Shopify
        run: |
          if [ -n "${{ inputs.theme_id }}" ]; then
            shopify theme push --theme "${{ inputs.theme_id }}" --nodelete --ignore config/settings_data.json
          else
            shopify theme push --live --allow-live --nodelete --ignore config/settings_data.json
          fi
