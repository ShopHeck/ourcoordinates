# Theme CI for the GitHub→Shopify sync.
#
# The live theme ("ourcoordinates/main") is connected to this repo's main
# branch through Shopify's GitHub integration — every merge syncs to the
# store within seconds. The sync has one silent failure mode we've hit:
# section files over ~50 KB are skipped without any error, leaving the live
# file stale while everything else updates (see docs/deployment.md).
#
# validate (PRs + main, no secrets needed):
#   - shopify theme check at error level
#   - hard size guard on sections/ and snippets/ so an oversized file can
#     never merge and silently stall the sync again
#
# deploy (manual fallback only — the integration normally does this):
#   Actions tab → "Theme CI" → Run workflow. Needs repo secrets
#   SHOPIFY_CLI_THEME_TOKEN (Theme Access password) and SHOPIFY_STORE
#   (your-store.myshopify.com). Leave theme_id empty for the live theme.
name: Theme CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      theme_id:
        description: "Theme ID to push to (leave empty for the live theme)"
        required: false
        default: ""

concurrency:
  group: theme-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # A section over the sync's per-file cap merges cleanly, then never
      # reaches the store — the exact failure that froze the engraving
      # previews on July 12, 2026. Fail loudly here instead. 48 000 bytes
      # leaves margin below the lowest observed working size (50 224).
      - name: Guard section/snippet file sizes
        run: |
          LIMIT=48000
          fail=0
          for f in sections/*.liquid snippets/*.liquid; do
            [ -f "$f" ] || continue
            size=$(wc -c < "$f")
            if [ "$size" -gt "$LIMIT" ]; then
              echo "::error file=$f::$f is ${size} bytes (limit ${LIMIT}). Files this large are silently skipped by the Shopify GitHub sync — split it into snippets (see docs/deployment.md)."
              fail=1
            fi
          done
          exit $fail

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Theme Check
        run: shopify theme check --fail-level error

  deploy:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
      SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
    steps:
      - name: Check deploy secrets exist
        run: |
          if [ -z "$SHOPIFY_CLI_THEME_TOKEN" ] || [ -z "$SHOPIFY_FLAG_STORE" ]; then
            echo "::error::Missing SHOPIFY_CLI_THEME_TOKEN and/or SHOPIFY_STORE repository secrets — nothing was deployed. See docs/deployment.md."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      # --nodelete keeps store-only files (app assets, editor-created
      # templates); settings_data.json is excluded so merchant theme-editor
      # settings are never clobbered by a manual deploy.
      - name: Push theme to Shopify
        run: |
          if [ -n "${{ inputs.theme_id }}" ]; then
            shopify theme push --theme "${{ inputs.theme_id }}" --nodelete --ignore config/settings_data.json
          else
            shopify theme push --live --allow-live --nodelete --ignore config/settings_data.json
          fi
