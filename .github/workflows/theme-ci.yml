# Theme CI for the GitHub→Shopify sync.
#
# The live theme ("ourcoordinates/main") is connected to this repo's main
# branch through Shopify's GitHub integration — every merge syncs to the
# store within seconds. The sync has one silent failure mode we've hit:
# section files over ~50 KB are skipped without any error, leaving the live
# file stale while everything else updates (see docs/deployment.md).
#
# validate (PRs + main, no secrets needed):
#   - shopify theme check at error level
#   - hard size guard on sections/ and snippets/ so an oversized file can
#     never merge and silently stall the sync again
#
# deploy (manual fallback only — the integration normally does this):
#   Actions tab → "Theme CI" → Run workflow. Needs repo secrets
#   SHOPIFY_CLI_THEME_TOKEN (Theme Access password) and SHOPIFY_STORE
#   (your-store.myshopify.com). Leave theme_id empty for the live theme.
name: Theme CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      theme_id:
        description: "Theme ID to push to (leave empty for the live theme)"
        required: false
        default: ""

concurrency:
  group: theme-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # A section over the sync's per-file cap merges cleanly, then never
      # reaches the store — the exact failure that froze the engraving
      # previews on July 12, 2026. Fail loudly here instead. 50 224 bytes
      # is the largest section the sync has ever accepted on this store;
      # anything bigger has silently failed.
      - name: Guard section/snippet file sizes
        run: |
          LIMIT=50224
          fail=0
          for f in sections/*.liquid snippets/*.liquid; do
            [ -f "$f" ] || continue
            size=$(wc -c < "$f")
            if [ "$size" -gt "$LIMIT" ]; then
              echo "::error file=$f::$f is ${size} bytes (limit ${LIMIT}). Files this large are silently skipped by the Shopify GitHub sync — split it into snippets (see docs/deployment.md)."
              fail=1
            fi
          done
          exit $fail

      # A section's {% schema %}…{% endschema %} must be the last thing in the
      # file. Anything after {% endschema %} (even a Liquid comment) can
      # invalidate the section server-side on the Shopify GitHub sync — which
      # then hides every product template that renders it. theme-check
      # tolerates it, so it merges clean and breaks silently. This is the
      # second half of the July 12, 2026 incident (see docs/deployment.md).
      - name: Guard nothing follows endschema in sections
        run: |
          fail=0
          for f in sections/*.liquid; do
            [ -f "$f" ] || continue
            grep -q 'endschema' "$f" || continue
            after=$(awk 'found{print} /endschema/{found=1}' "$f" | tr -d '[:space:]')
            if [ -n "$after" ]; then
              echo "::error file=$f::content follows {% endschema %} in $f — the schema must end the file, or the Shopify sync can reject the section (see docs/deployment.md)."
              fail=1
            fi
          done
          exit $fail

      # Shopify caps schema select/radio OPTION labels at 50 characters and
      # rejects the ENTIRE section on sync if one is longer — with no failed
      # check and no error in GitHub. `shopify theme check` does NOT validate
      # this, so it merges clean and the section silently never updates. This
      # is what actually froze main-product.liquid (the "50 KB size cap" was a
      # misdiagnosis — see docs/deployment.md). Guard it here.
      - name: Guard schema option-label length (Shopify max 50)
        run: |
          python3 - <<'PY'
          import re, json, glob, sys
          MAX = 50
          fail = False
          for f in sorted(glob.glob("sections/*.liquid") + glob.glob("snippets/*.liquid")):
              src = open(f, encoding="utf-8").read()
              m = re.search(r"\{%-?\s*schema\s*-?%\}(.*?)\{%-?\s*endschema\s*-?%\}", src, re.S)
              if not m:
                  continue
              try:
                  schema = json.loads(m.group(1))
              except Exception:
                  continue  # invalid JSON is theme-check's job to flag
              groups = [("settings", schema.get("settings", []))]
              for b in schema.get("blocks", []):
                  if isinstance(b, dict):
                      groups.append((f"block '{b.get('type')}'", b.get("settings", [])))
              for where, settings in groups:
                  if not isinstance(settings, list):
                      continue
                  for s in settings:
                      if not isinstance(s, dict):
                          continue
                      for opt in (s.get("options") or []):
                          lbl = (opt or {}).get("label", "") if isinstance(opt, dict) else ""
                          if len(lbl) > MAX:
                              print(f"::error file={f}::setting id='{s.get('id')}' ({where}) has an option label of {len(lbl)} chars (max {MAX}): {lbl!r}. Shopify rejects the whole section on sync; shorten the label (the option value is unaffected).")
                              fail = True
          sys.exit(1 if fail else 0)
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      - name: Theme Check
        run: shopify theme check --fail-level error

  deploy:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SHOPIFY_CLI_THEME_TOKEN: ${{ secrets.SHOPIFY_CLI_THEME_TOKEN }}
      SHOPIFY_FLAG_STORE: ${{ secrets.SHOPIFY_STORE }}
    steps:
      - name: Check deploy secrets exist
        run: |
          if [ -z "$SHOPIFY_CLI_THEME_TOKEN" ] || [ -z "$SHOPIFY_FLAG_STORE" ]; then
            echo "::error::Missing SHOPIFY_CLI_THEME_TOKEN and/or SHOPIFY_STORE repository secrets — nothing was deployed. See docs/deployment.md."
            exit 1
          fi

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Shopify CLI
        run: npm install -g @shopify/cli@latest

      # --nodelete keeps store-only files (app assets, editor-created
      # templates); settings_data.json is excluded so merchant theme-editor
      # settings are never clobbered by a manual deploy.
      - name: Push theme to Shopify
        run: |
          if [ -n "${{ inputs.theme_id }}" ]; then
            shopify theme push --theme "${{ inputs.theme_id }}" --nodelete --ignore config/settings_data.json
          else
            shopify theme push --live --allow-live --nodelete --ignore config/settings_data.json
          fi
